<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elementum — Interactive Periodic Table</title>
<!-- Libraries for PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg: #0a0c14;
  --surface: #111420;
  --surface2: #1a1f30;
  --border: #252b40;
  --text: #e8eaf0;
  --text-muted: #6b7394;
  --accent: #4fc3f7;
  --accent2: #7c6ff7;
  --cell-size: 68px;
  --cell-gap: 3px;
  --radius: 6px;
  --modal-z: 1000;

  /* Category Colors */
  --alkali-metal: #ff6b6b;
  --alkaline-earth: #ffa94d;
  --transition-metal: #74c0fc;
  --post-transition: #63e6be;
  --metalloid: #a9e34b;
  --nonmetal: #ffd43b;
  --halogen: #f783ac;
  --noble-gas: #da77f2;
  --lanthanide: #4dabf7;
  --actinide: #ff8787;

  /* Category Gradients */
  --cell-bg-alkali-metal: linear-gradient(135deg,#c0392b,#e74c3c);
  --cell-bg-alkaline-earth: linear-gradient(135deg,#d35400,#e67e22);
  --cell-bg-transition-metal: linear-gradient(135deg,#1565c0,#1976d2);
  --cell-bg-post-transition: linear-gradient(135deg,#00695c,#00897b);
  --cell-bg-metalloid: linear-gradient(135deg,#558b2f,#7cb342);
  --cell-bg-nonmetal: linear-gradient(135deg,#f57f17,#fbc02d);
  --cell-bg-halogen: linear-gradient(135deg,#ad1457,#e91e63);
  --cell-bg-noble-gas: linear-gradient(135deg,#6a1b9a,#8e24aa);
  --cell-bg-lanthanide: linear-gradient(135deg,#0277bd,#0288d1);
  --cell-bg-actinide: linear-gradient(135deg,#b71c1c,#c62828);
  --cell-bg-unknown: linear-gradient(135deg,#2d3561,#3d4a75);

  --cell-text: #fff;
  --cell-num-color: rgba(255,255,255,0.45);
  --cell-name-color: rgba(255,255,255,0.6);
  --cell-mass-color: rgba(255,255,255,0.4);
}
 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', 'Lucida Console', monospace;
  min-height: 100vh;
  overflow-x: auto;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  padding: 24px 32px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1020 0%, transparent 100%);
}
 
.logo {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo span {
  font-size: 11px;
  display: block;
  letter-spacing: 3px;
  font-weight: 400;
  -webkit-text-fill-color: var(--text-muted);
}
 
.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
 
/* ============================================================
   CONTROLS
   ============================================================ */
.search-wrap {
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  width: 16px;
  height: 16px;
}
 
#searchInput {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 8px 12px 8px 34px;
  font-family: inherit;
  font-size: 13px;
  width: 200px;
  outline: none;
  transition: border-color 0.2s, width 0.3s;
}
#searchInput:focus { border-color: var(--accent); width: 240px; }
 
.btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 8px 14px;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.08); }
 
.btn-export {
  border-color: var(--accent);
  color: var(--accent);
  font-weight: bold;
}
.btn-export:hover {
  background: rgba(79,195,247,0.15);
}

/* ============================================================
   CATEGORY LEGEND & FILTERS
   ============================================================ */
.controls-bar {
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
 
.cat-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-btn .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-btn:hover { border-color: var(--border); color: var(--text); }
.cat-btn.active {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.15);
  color: var(--text);
}
.cat-btn.active .dot { box-shadow: 0 0 6px currentColor; }
 
.controls-bar label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-right: 4px;
}
 
/* ============================================================
   MAIN TABLE LAYOUT
   ============================================================ */
.table-wrap {
  padding: 20px 24px;
  overflow-x: auto;
  display: flex;
  justify-content: center;
  width: 100%;
}
 
.periodic-table {
  display: grid;
  grid-template-columns: repeat(18, var(--cell-size));
  grid-template-rows: repeat(10, var(--cell-size));
  gap: var(--cell-gap);
  transition: all 0.3s ease;
}
 
/* ============================================================
   ELEMENT CELLS
   ============================================================ */
.element {
  position: relative;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px 2px 2px;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, opacity 0.3s;
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  user-select: none;
}
 
.element::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius);
  transition: opacity 0.2s;
  opacity: 0;
}
 
.element:hover { transform: scale(1.12); z-index: 10; }
.element:hover::before { opacity: 1; }
 
.element.faded { opacity: 0.12; transform: scale(0.92); }
.element.highlighted {
  animation: glow-pulse 1.5s ease-in-out infinite alternate;
}
 
@keyframes glow-pulse {
  from { box-shadow: 0 0 6px 1px currentColor; }
  to   { box-shadow: 0 0 14px 4px currentColor; }
}
 
.el-num {
  font-size: 9px;
  color: var(--cell-num-color);
  align-self: flex-start;
  margin-left: 4px;
  line-height: 1;
}
.el-sym {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.el-name {
  font-size: 7.5px;
  color: var(--cell-name-color);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
  padding: 0 2px;
}
.el-mass {
  font-size: 7.5px;
  color: var(--cell-mass-color);
}
 
/* Category backgrounds */
.cat-alkali-metal    { background: var(--cell-bg-alkali-metal); }
.cat-alkaline-earth  { background: var(--cell-bg-alkaline-earth); }
.cat-transition-metal{ background: var(--cell-bg-transition-metal); }
.cat-post-transition { background: var(--cell-bg-post-transition); }
.cat-metalloid       { background: var(--cell-bg-metalloid); }
.cat-nonmetal        { background: var(--cell-bg-nonmetal); }
.cat-halogen         { background: var(--cell-bg-halogen); }
.cat-noble-gas       { background: var(--cell-bg-noble-gas); }
.cat-lanthanide      { background: var(--cell-bg-lanthanide); }
.cat-actinide        { background: var(--cell-bg-actinide); }
.cat-unknown         { background: var(--cell-bg-unknown); }
 
/* ============================================================
   THEMES
   ============================================================ */
body.theme-bw {
  --bg:#fff; --surface:#f0f0f0; --surface2:#e0e0e0; --border:#bbb;
  --text:#111; --text-muted:#555; --accent:#222; --accent2:#444;
  --cell-bg-alkali-metal:#555; --cell-bg-alkaline-earth:#666;
  --cell-bg-transition-metal:#888; --cell-bg-post-transition:#777;
  --cell-bg-metalloid:#999; --cell-bg-nonmetal:#aaa;
  --cell-bg-halogen:#444; --cell-bg-noble-gas:#333;
  --cell-bg-lanthanide:#777; --cell-bg-actinide:#555; --cell-bg-unknown:#bbb;
}
body.theme-pastel {
  --bg:#fdf6ff; --surface:#f3e8ff; --surface2:#ede0fb; --border:#d8b4fe;
  --text:#3b1a6b; --text-muted:#7c5cbf; --accent:#9333ea; --accent2:#c084fc;
  --cell-bg-alkali-metal:linear-gradient(135deg,#fca5a5,#f87171);
  --cell-bg-alkaline-earth:linear-gradient(135deg,#fdba74,#fb923c);
  --cell-bg-transition-metal:linear-gradient(135deg,#93c5fd,#60a5fa);
  --cell-bg-post-transition:linear-gradient(135deg,#6ee7b7,#34d399);
  --cell-bg-metalloid:linear-gradient(135deg,#bef264,#a3e635);
  --cell-bg-nonmetal:linear-gradient(135deg,#fde68a,#fcd34d);
  --cell-bg-halogen:linear-gradient(135deg,#f9a8d4,#f472b6);
  --cell-bg-noble-gas:linear-gradient(135deg,#d8b4fe,#c084fc);
  --cell-bg-lanthanide:linear-gradient(135deg,#7dd3fc,#38bdf8);
  --cell-bg-actinide:linear-gradient(135deg,#fca5a5,#f87171);
  --cell-bg-unknown:#e9d5ff;
}
body.theme-forest {
  --bg:#0a1a0e; --surface:#122018; --surface2:#1a3020; --border:#2d5a3a;
  --text:#c8f0d0; --text-muted:#4a8060; --accent:#4ade80; --accent2:#86efac;
  --cell-bg-alkali-metal:linear-gradient(135deg,#166534,#15803d);
  --cell-bg-alkaline-earth:linear-gradient(135deg,#14532d,#16a34a);
  --cell-bg-transition-metal:linear-gradient(135deg,#1e4620,#22c55e);
  --cell-bg-post-transition:linear-gradient(135deg,#064e3b,#059669);
  --cell-bg-metalloid:linear-gradient(135deg,#365314,#65a30d);
  --cell-bg-nonmetal:linear-gradient(135deg,#4d7c0f,#84cc16);
  --cell-bg-halogen:linear-gradient(135deg,#1a4731,#10b981);
  --cell-bg-noble-gas:linear-gradient(135deg,#0f4c34,#34d399);
  --cell-bg-lanthanide:linear-gradient(135deg,#166534,#4ade80);
  --cell-bg-actinide:linear-gradient(135deg,#14532d,#22c55e);
  --cell-bg-unknown:#1f3a26;
}
body.theme-ocean {
  --bg:#020d1a; --surface:#051828; --surface2:#092038; --border:#0d3558;
  --text:#b8e0f7; --text-muted:#3a7090; --accent:#38bdf8; --accent2:#7dd3fc;
  --cell-bg-alkali-metal:linear-gradient(135deg,#0c4a6e,#0369a1);
  --cell-bg-alkaline-earth:linear-gradient(135deg,#164e63,#0891b2);
  --cell-bg-transition-metal:linear-gradient(135deg,#1e3a5f,#1d4ed8);
  --cell-bg-post-transition:linear-gradient(135deg,#0c4a6e,#0284c7);
  --cell-bg-metalloid:linear-gradient(135deg,#0a4060,#06b6d4);
  --cell-bg-nonmetal:linear-gradient(135deg,#1e3a8a,#3b82f6);
  --cell-bg-halogen:linear-gradient(135deg,#1e3a5f,#6366f1);
  --cell-bg-noble-gas:linear-gradient(135deg,#312e81,#4f46e5);
  --cell-bg-lanthanide:linear-gradient(135deg,#0c4a6e,#38bdf8);
  --cell-bg-actinide:linear-gradient(135deg,#1e3a5f,#0ea5e9);
  --cell-bg-unknown:#0d2035;
}
body.theme-sunset {
  --bg:#1a0a00; --surface:#2a1200; --surface2:#3a1a00; --border:#6b3000;
  --text:#ffecd0; --text-muted:#a05030; --accent:#fb923c; --accent2:#fbbf24;
  --cell-bg-alkali-metal:linear-gradient(135deg,#9a1a00,#dc2626);
  --cell-bg-alkaline-earth:linear-gradient(135deg,#92400e,#d97706);
  --cell-bg-transition-metal:linear-gradient(135deg,#c2410c,#ea580c);
  --cell-bg-post-transition:linear-gradient(135deg,#78350f,#f59e0b);
  --cell-bg-metalloid:linear-gradient(135deg,#b45309,#fbbf24);
  --cell-bg-nonmetal:linear-gradient(135deg,#c2410c,#f97316);
  --cell-bg-halogen:linear-gradient(135deg,#9f1239,#e11d48);
  --cell-bg-noble-gas:linear-gradient(135deg,#7f1d1d,#ef4444);
  --cell-bg-lanthanide:linear-gradient(135deg,#c2410c,#fb923c);
  --cell-bg-actinide:linear-gradient(135deg,#991b1b,#f87171);
  --cell-bg-unknown:#3a1a00;
}
 
/* ============================================================
   THEME PANEL
   ============================================================ */
.theme-panel {
  display: none;
  position: fixed;
  top: 70px; right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  z-index: 500;
  min-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.theme-panel.open { display: block; }
.theme-panel h4 { font-size: 11px; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px; margin-top: 0; }
.theme-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.theme-opt {
  padding: 8px 8px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-family: inherit;
  font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.theme-opt:hover { border-color: var(--accent); color: var(--accent); }
.theme-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.1); }

.color-section h4 { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; font-size: 11px; }
.color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; margin-bottom: 15px; }
.color-row { display: flex; align-items: center; gap: 6px; }
.color-row label { font-size: 10px; color: var(--text-muted); flex: 1; overflow:hidden; text-overflow: ellipsis; white-space: nowrap; }
.color-row input[type=color] { width: 28px; height: 22px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: none; padding: 1px; }

.theme-actions { display: flex; gap: 8px; margin-top: 5px; }
.theme-btn {
  flex: 1; padding: 6px; font-size: 10px; cursor: pointer; border: none; border-radius: 4px; font-family: inherit;
}
.theme-btn-reset-colors { background: #444; color: #fff; }
.theme-btn-reset-colors:hover { background: #666; }

.panel-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
 
.series-label {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.02);
  border: 1px dashed var(--border);
}
 
/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,7,15,0.85);
  z-index: var(--modal-z);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
 
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(40px) scale(0.96);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
 
.modal-header { display: flex; align-items: stretch; gap: 0; border-radius: 12px 12px 0 0; overflow: hidden; }
.modal-color-band { width: 8px; flex-shrink: 0; }
.modal-title-area { padding: 24px 20px; flex: 1; display: flex; align-items: center; gap: 20px; }
.modal-symbol { font-size: 64px; font-weight: 900; line-height: 1; opacity: 0.95; }
.modal-name-block h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
.modal-name-block .modal-num { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; margin-top: 2px; }
.modal-name-block .modal-cat { font-size: 11px; margin-top: 6px; padding: 2px 8px; border-radius: 20px; display: inline-block; background: rgba(255,255,255,0.08); letter-spacing: 1px; }
 
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted);
  border-radius: 50%;
  width: 28px; height: 28px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; line-height: 1;
}
.modal-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
 
.modal-body { padding: 20px 24px 24px; }
.modal-summary { font-size: 13px; line-height: 1.7; color: var(--text-muted); margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
 
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-prop { background: var(--surface2); border-radius: 6px; padding: 10px 12px; }
.modal-prop .label { font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.modal-prop .value { font-size: 14px; font-weight: 600; color: var(--text); }
.modal-prop.full { grid-column: 1 / -1; }
.electron-config { font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 1px; word-break: break-all; }

/* ============================================================
   GLOBAL RESET BUTTON
   ============================================================ */
.global-reset { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.global-reset-btn {
  font-size: 10px;
  background: transparent;
  border: 1px dashed var(--text-muted);
  color: var(--text-muted);
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}
.global-reset-btn:hover {
  border-color: #ff6b6b;
  color: #ff6b6b;
}

/* ============================================================
   MISC
   ============================================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
 
</style>
</head>
<body>
 
<header>
  <div class="logo">
    Elementum
    <span>Interactive Periodic Table</span>
  </div>
 
  <div class="header-controls">
    <div class="search-wrap" id="searchWrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search element..." autocomplete="off">
    </div>
    
    <button class="btn" onclick="toggleThemePanel()">🎨 THEME</button>
    
    <!-- ONLY PDF EXPORT BUTTON REMAINS -->
    <button class="btn btn-export" onclick="exportToPDF()">💾 EXPORT PDF</button>
    
    <div class="global-reset">
      <button class="global-reset-btn" onclick="resetAll()" title="Reset Theme and Filters">↺ RESET ALL</button>
    </div>
  </div>
</header>
 
<div class="controls-bar" id="controlsBar">
  <label>FILTER:</label>
  <button class="cat-btn" data-cat="alkali-metal" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--alkali-metal)"></span>Alkali Metals
  </button>
  <button class="cat-btn" data-cat="alkaline-earth" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--alkaline-earth)"></span>Alkaline Earth
  </button>
  <button class="cat-btn" data-cat="transition-metal" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--transition-metal)"></span>Transition Metals
  </button>
  <button class="cat-btn" data-cat="post-transition" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--post-transition)"></span>Post-Transition
  </button>
  <button class="cat-btn" data-cat="metalloid" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--metalloid)"></span>Metalloids
  </button>
  <button class="cat-btn" data-cat="nonmetal" onclick="toggleCat(this)">
    <span class="dot" style="background:var(--nonmetal)"></span>Nonmetals

/* ============================================================
   GRID POSITIONS
   ============================================================ */
function gridPos(el) {
  const p = el.period;
  const g = el.group;
 
  if (el.n >= 57 && el.n <= 71) {
    return { col: el.n - 57 + 4, row: 9 };
  }
  if (el.n >= 89 && el.n <= 103) {
    return { col: el.n - 89 + 4, row: 10 };
  }
 
  return { col: g, row: p };
}
 
/* ============================================================
   STATE
   ============================================================ */
let activeCats = new Set();
let searchTerm = '';
let customColors = JSON.parse(localStorage.getItem('ptCustomColors') || '{}');
let currentTheme = localStorage.getItem('ptTheme') || '';
 
/* ============================================================
   RENDER TABLE
   ============================================================ */
function catClass(cat) {
  return 'cat-' + cat.replace(/\s+/g, '-');
}
 
function catColor(cat) {
  const map = {
    'alkali-metal':    'var(--alkali-metal)',
    'alkaline-earth':  'var(--alkaline-earth)',
    'transition-metal':'var(--transition-metal)',
    'post-transition': 'var(--post-transition)',
    'metalloid':       'var(--metalloid)',
    'nonmetal':        'var(--nonmetal)',
    'halogen':         'var(--halogen)',
    'noble-gas':       'var(--noble-gas)',
    'lanthanide':      'var(--lanthanide)',
    'actinide':        'var(--actinide)',
    'unknown':         '#3d4a75',
  };
  return map[cat] || '#888';
}
 
function getVal(el, field) {
  return el[field];
}
 
function renderTable() {
  const table = document.getElementById('periodicTable');
  table.innerHTML = '';
 
  ELEMENTS.forEach(el => {
    const pos = gridPos(el);
    const div = document.createElement('div');
    div.className = `element ${catClass(el.cat)}`;
    div.id = `el-${el.n}`;
    div.style.gridColumn = pos.col;
    div.style.gridRow = pos.row;
    div.setAttribute('data-n', el.n);
    div.setAttribute('data-cat', el.cat);
    div.setAttribute('data-name', el.name.toLowerCase());
    div.setAttribute('data-sym', el.sym.toLowerCase());
 
    const num  = el.n;
    const sym  = el.sym;
    const name = el.name;
    const mass = el.mass;
 
    div.innerHTML = `
      <span class="el-num" data-field="n">${num}</span>
      <span class="el-sym" data-field="sym">${sym}</span>
      <span class="el-name" data-field="name">${name}</span>
      <span class="el-mass">${mass}</span>
    `;
 
    div.addEventListener('click', () => openModal(el));
    table.appendChild(div);
  });
 
  const lantLabel = document.createElement('div');
  lantLabel.className = 'series-label';
  lantLabel.style.gridColumn = '1 / 4';
  lantLabel.style.gridRow = '9';
  lantLabel.innerHTML = '57–71<br>LANTHANIDES';
  table.appendChild(lantLabel);
 
  const actLabel = document.createElement('div');
  actLabel.className = 'series-label';
  actLabel.style.gridColumn = '1 / 4';
  actLabel.style.gridRow = '10';
  actLabel.innerHTML = '89–103<br>ACTINIDES';
  table.appendChild(actLabel);
 
  const gap = document.createElement('div');
  gap.className = 'gap-row';
  gap.style.gridColumn = '1 / -1';
  gap.style.gridRow = '8';
  table.appendChild(gap);
 
  applyFilters();
}
 
/* ============================================================
   FILTER & SEARCH
   ============================================================ */
function applyFilters() {
  const els = document.querySelectorAll('.element');
  els.forEach(el => {
    const cat = el.getAttribute('data-cat');
    const name = el.getAttribute('data-name');
    const sym = el.getAttribute('data-sym');
    const num = el.getAttribute('data-n');
 
    let catMatch = activeCats.size === 0 || activeCats.has(cat);
    let searchMatch = !searchTerm ||
      name.includes(searchTerm) ||
      sym.includes(searchTerm) ||
      num.includes(searchTerm);
 
    if (catMatch && searchMatch) {
      el.classList.remove('faded');
      if (activeCats.size > 0 && activeCats.has(cat)) {
        el.classList.add('highlighted');
      } else {
        el.classList.remove('highlighted');
      }
    } else {
      el.classList.add('faded');
      el.classList.remove('highlighted');
    }
  });
}
 
function toggleCat(btn) {
  const cat = btn.getAttribute('data-cat');
  if (activeCats.has(cat)) {
    activeCats.delete(cat);
    btn.classList.remove('active');
  } else {
    activeCats.add(cat);
    btn.classList.add('active');
  }
  applyFilters();
}
 
function clearCatFilters() {
  activeCats.clear();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  applyFilters();
}
 
document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.trim().toLowerCase();
  applyFilters();
});
 
/* ============================================================
   MODAL
   ============================================================ */
function fmt(val, unit='', fallback='—') {
  if (val === null || val === undefined) return fallback;
  return val + unit;
}
 
function openModal(el) {
  const overlay = document.getElementById('modalOverlay');
  const color = catColor(el.cat);
 
  document.getElementById('modalBand').style.background = color;
  document.getElementById('modalSym').textContent = el.sym;
  document.getElementById('modalSym').style.color = color;
  document.getElementById('modalName').textContent = el.name;
  document.getElementById('modalNum').textContent = `ATOMIC NUMBER ${el.n}`;
  document.getElementById('modalCat').textContent = el.cat.replace(/-/g,' ').toUpperCase();
  document.getElementById('modalSummary').textContent = el.fact;
 
  const grid = document.getElementById('modalGrid');
  const props = [
    ['ATOMIC MASS', fmt(el.mass, ' u')],
    ['YEAR DISCOVERED', el.year || 'Ancient'],
    ['ELECTRONEGATIVITY', fmt(el.en, ' (Pauling)')],
    ['ATOMIC RADIUS', fmt(el.radius, ' pm')],
    ['MELTING POINT', fmt(el.melt, ' °C')],
    ['BOILING POINT', fmt(el.boil, ' °C')],
    ['GROUP', fmt(el.group)],
    ['PERIOD', fmt(el.period)],
    ['ELECTRON CONFIG', el.config, 'full'],
  ];
 
  grid.innerHTML = props.map(([label, value, cls='']) => `
    <div class="modal-prop ${cls}">
      <div class="label">${label}</div>
      <div class="value ${cls === 'full' ? 'electron-config' : ''}">${value}</div>
    </div>
  `).join('');
 
  overlay.classList.add('open');
}
 
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
 
function closeModalOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
 
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ============================================================
   EXPORT TO PDF (JSPDF + HTML2CANVAS)
   ============================================================ */
async function exportToPDF() {
    const pdf = new jspdf.jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: 'a4'
    });
    
    const table = document.getElementById('periodicTable');
    
    try {
        // Capture the table as a canvas
        const canvas = await html2canvas(table, {
            scale: 4, // High resolution for printing
            backgroundColor: '#ffffff', // Force white background
            logging: false,
            useCORS: true
        });
        
        // Calculate dimensions to fit on A4 landscape with padding
        // A4 Landscape: 297mm (W) x 210mm (H)
        // Target Size: 277mm (W) x 190mm (H) -> Creates ~10mm margin on all sides
        const targetWidth = 277; 
        const targetHeight = 190;
        
        const canvasWidth = canvas.width * 0.283; // pixels to mm
        const canvasHeight = canvas.height * 0.283; // pixels to mm
        
        let finalWidth = canvasWidth;
        let finalHeight = canvasHeight;
        let xPos = (297 - finalWidth) / 2;
        let yPos = (210 - finalHeight) / 2;
        
        // Check if we need to scale down to fit the target size (with padding)
        let scaleRatio = 1;
        
        if (canvasWidth > targetWidth || canvasHeight > targetHeight) {
            // Calculate scale ratios for width and height
            const ratioW = targetWidth / canvasWidth;
            const ratioH = targetHeight / canvasHeight;
            
            // Use the smaller ratio to ensure it fits in both dimensions
            scaleRatio = Math.min(ratioW, ratioH);
            
            finalWidth = canvasWidth * scaleRatio;
            finalHeight = canvasHeight * scaleRatio;
            
            // Recalculate centering based on new scaled dimensions
            xPos = (297 - finalWidth) / 2;
            yPos = (210 - finalHeight) / 2;
        } else {
            // If canvas is already smaller than target, just center it
            xPos = (297 - finalWidth) / 2;
            yPos = (210 - finalHeight) / 2;
        }

        // Add image to PDF with calculated dimensions and centering
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', xPos, yPos, finalWidth, finalHeight);
        
        // Save
        pdf.save(`elementum_table_${currentTheme || 'dark'}.pdf`);
        
    } catch (err) {
        console.error('PDF Export Error:', err);
        alert('Could not generate PDF. Please check console logs.');
    }
}

/* ============================================================
   THEME & RESET LOGIC (FIXED COLOR STICKING BUG)
   ============================================================ */
const CAT_NAMES = [
  ['alkali-metal','Alkali Metal'],['alkaline-earth','Alkaline Earth'],
  ['transition-metal','Trans. Metal'],['post-transition','Post-Trans.'],
  ['metalloid','Metalloid'],['nonmetal','Nonmetal'],
  ['halogen','Halogen'],['noble-gas','Noble Gas'],
  ['lanthanide','Lanthanide'],['actinide','Actinide'],['unknown','Unknown']
];

function buildColorPickers() {
  const grid = document.getElementById('colorPickers');
  grid.innerHTML = CAT_NAMES.map(([cat, label]) => `
    <div class="color-row">
      <label title="${label}">${label}</label>
      <input type="color" id="cp-${cat}" value="${customColors[cat] || '#888888'}"
        oninput="applyCustomColor('${cat}', this.value)">
    </div>`).join('');
}

function applyCustomColor(cat, color) {
  customColors[cat] = color;
  localStorage.setItem('ptCustomColors', JSON.stringify(customColors));
  document.documentElement.style.setProperty(`--cell-bg-${cat}`, color);
  document.querySelectorAll(`.cat-${cat}`).forEach(el => {
      el.style.background = color;
  });
}

function setTheme(theme, btn) {
  document.body.classList.remove('theme-bw','theme-pastel','theme-forest','theme-ocean','theme-sunset');
  
  if (theme) {
    document.body.classList.add('theme-' + theme);
  }
  
  currentTheme = theme;
  localStorage.setItem('ptTheme', theme);
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // CRITICAL FIX: Remove inline background styles from ALL elements.
  const allElements = document.querySelectorAll('.element');
  allElements.forEach(el => {
      el.style.background = ''; 
  });

  if (theme === '') {
    Object.entries(customColors).forEach(([cat, color]) => {
      document.documentElement.style.setProperty(`--cell-bg-${cat}`, color);
      document.querySelectorAll(`.cat-${cat}`).forEach(el => {
          el.style.background = color;
      });
    });
  }
}

function resetCustomColors() {
    if(!confirm('Reset custom colors to default settings?')) return;
    customColors = {};
    localStorage.removeItem('ptCustomColors');
    
    if(currentTheme === '') {
        document.documentElement.style.setProperty(`--cell-bg-alkali-metal`, 'linear-gradient(135deg,#c0392b,#e74c3c)');
        document.documentElement.style.setProperty(`--cell-bg-alkaline-earth`, 'linear-gradient(135deg,#d35400,#e67e22)');
        document.documentElement.style.setProperty(`--cell-bg-transition-metal`, 'linear-gradient(135deg,#1565c0,#1976d2)');
        document.documentElement.style.setProperty(`--cell-bg-post-transition`, 'linear-gradient(135deg,#00695c,#00897b)');
        document.documentElement.style.setProperty(`--cell-bg-metalloid`, 'linear-gradient(135deg,#558b2f,#7cb342)');
        document.documentElement.style.setProperty(`--cell-bg-nonmetal`, 'linear-gradient(135deg,#f57f17,#fbc02d)');
        document.documentElement.style.setProperty(`--cell-bg-halogen`, 'linear-gradient(135deg,#ad1457,#e91e63)');
        document.documentElement.style.setProperty(`--cell-bg-noble-gas`, 'linear-gradient(135deg,#6a1b9a,#8e24aa)');
        document.documentElement.style.setProperty(`--cell-bg-lanthanide`, 'linear-gradient(135deg,#0277bd,#0288d1)');
        document.documentElement.style.setProperty(`--cell-bg-actinide`, 'linear-gradient(135deg,#b71c1c,#c62828)');
        document.documentElement.style.setProperty(`--cell-bg-unknown`, 'linear-gradient(135deg,#2d3561,#3d4a75)');
        
        CAT_NAMES.forEach(([cat]) => {
            const input = document.getElementById(`cp-${cat}`);
            if(input) input.value = '#888888';
        });
        
        const allElements = document.querySelectorAll('.element');
        allElements.forEach(el => {
            el.style.background = '';
        });
    } else {
        setTheme(currentTheme, document.querySelector(`.theme-opt[onclick*="'${currentTheme}'"]`));
    }
}

function resetAll() {
    if(!confirm('This will reset your theme, custom colors, and filters. Continue?')) return;
    
    currentTheme = '';
    localStorage.removeItem('ptTheme');
    document.body.classList.remove('theme-bw','theme-pastel','theme-forest','theme-ocean','theme-sunset');
    
    document.querySelectorAll('.element').forEach(el => el.style.background = '');
    resetCustomColors();
    clearCatFilters();
    
    document.querySelectorAll('.theme-opt').forEach(b => b.classList.remove('active'));
    const defaultBtn = document.querySelector(`.theme-opt[onclick*="''"]`);
    if(defaultBtn) defaultBtn.classList.add('active');
}

function toggleThemePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}

function initTheme() {
  if (currentTheme) {
    document.body.classList.add('theme-' + currentTheme);
    const btn = document.querySelector(`.theme-opt[onclick*="'${currentTheme}'"]`);
    if (btn) { document.querySelectorAll('.theme-opt').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  }
  buildColorPickers();
  
  if (!currentTheme) {
    Object.entries(customColors).forEach(([cat, color]) => {
      document.documentElement.style.setProperty(`--cell-bg-${cat}`, color);
      document.querySelectorAll(`.cat-${cat}`).forEach(el => el.style.background = color);
    });
  }
}
 
/* ============================================================
   INIT
   ============================================================ */
initTheme();
renderTable();
</script>
